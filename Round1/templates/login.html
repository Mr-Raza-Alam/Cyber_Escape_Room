<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE ACCESS - LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: #00ff00;
            display: flex;
            height: 100vh;
            margin: 0;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .login-box {
            border: 1px solid #00ff00;
            padding: 40px;
            background: rgba(0, 50, 0, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: flicker 1.5s infinite alternate;
        }
        @keyframes flicker {
            0% { opacity: 0.9; }
            100% { opacity: 1; box-shadow: 0 0 40px rgba(0, 255, 0, 0.4); }
        }
        h2 { letter-spacing: 5px; margin-bottom: 30px; }
        input {
            background: #001100;
            border: 1px solid #00ff00;
            color: #0ff;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        button:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }
        .error {
            color: #ff3333;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ADMIN LOGIN</h2>
        <div id="error-msg" class="error">INVALID ACCESS TOKEN</div>
        <form action="/admin/login" method="POST">
            <input type="password" name="password" placeholder="ENTER ACCESS KEY" required autofocus>
            <button type="submit">BREACH SYSTEM</button>
        </form>
    </div>
</body>
</html>
