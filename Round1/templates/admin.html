<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organizer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Share Tech Mono', monospace; background: #000; color: #00ff00; text-align: center; margin-top: 50px; }
        .dashboard { border: 1px solid #00ff00; padding: 20px; display: inline-block; box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); }
        button { background: #00ff00; color: #000; padding: 10px 20px; font-family: inherit; font-size: 1.2rem; cursor: pointer; border: none; font-weight: bold; margin-top: 20px;}
        button:hover { background: #fff; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h2>ROUND 1 - COMMAND CENTER</h2>
        <p>Total Advanced (nxtCount): <strong id="nxt" style="font-size:2rem;">0 / 25</strong></p>
        <p>Participants in Timeout Pool: <strong id="pool">0</strong></p>
        <p>Pool Evaluated: <strong id="eval">False</strong></p>
        
        <button id="btn-eval" onclick="evaluatePool()">Trigger FCFS Evaluation NOW</button>
    </div>

    <script>
        function updateStatus() {
            fetch('/api/admin/status').then(r=>r.json()).then(data => {
                document.getElementById('nxt').innerText = data.nxtCount + " / 25";
                document.getElementById('pool').innerText = data.pool_size;
                document.getElementById('eval').innerText = data.pool_evaluated;
                if(data.pool_evaluated) {
                    document.getElementById('btn-eval').style.display = 'none';
                }
            });
        }
        setInterval(updateStatus, 1500);
        updateStatus();

        function evaluatePool() {
            if(confirm("Are you sure? This will finalize all pooled timeout scores and grant spots.")) {
                fetch('/api/admin/evaluate', {method:'POST'}).then(r=>r.json()).then(data=>{
                    alert(data.status === 'success' ? "Evaluation Complete!" : data.status);
                    updateStatus();
                });
            }
        }
    </script>
</body>
</html>
