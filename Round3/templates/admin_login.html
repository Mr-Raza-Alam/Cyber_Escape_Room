<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SECURE ACCESS - ORGANIZER LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: #00ffcc;
            display: flex;
            height: 100vh;
            margin: 0;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            border: 1px solid #00ffcc;
            padding: 40px;
            text-align: center;
            background: rgba(0, 20, 20, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }
        input {
            background: #111;
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ROUND 3 ADMIN</h2>
        {% if error %}<p style="color: red;">INVALID ACCESS KEY</p>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="ADMIN TOKEN" required autofocus>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
