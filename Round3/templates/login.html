<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CIRCUIT BREACH - ACCESS PORTAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Share Tech Mono', monospace;
            background: #050505;
            color: #00ffcc;
            display: flex;
            height: 100vh;
            margin: 0;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .login-container {
            border: 1px solid rgba(0, 255, 204, 0.3);
            background: rgba(20, 20, 25, 0.8);
            padding: 50px;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 450px;
        }
        h1 { letter-spacing: 4px; margin-bottom: 30px; text-transform: uppercase; font-size: 1.8rem;}
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ffcc;
            color: #fff;
            font-family: inherit;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00ffcc;
            color: #000;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }
        button:hover {
            box-shadow: 0 0 20px #00ffcc;
            transform: scale(1.02);
        }
        .error { color: #ff3366; margin-bottom: 20px; font-size: 0.9rem;}
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Circuit Breach</h1>
        <p style="color: #888; margin-bottom: 20px;">[IDENTITY VERIFICATION REQUIRED]</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form action="/login" method="POST">
            <input type="text" name="name" placeholder="ENTER AGENT NAME" required autofocus>
            <button type="submit">ACCESS DASHBOARD</button>
        </form>
    </div>
</body>
</html>
