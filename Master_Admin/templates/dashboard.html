<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Cyber Escape Room</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0f1e;
    color: #e0e8ff;
    padding: 40px;
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1a3a6e;
    padding-bottom: 20px;
    margin-bottom: 40px;
  }
  .brand {
    font-size: 18px;
    color: #00e5a0;
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .logout-btn {
    background: none;
    border: 1px solid #ef4444;
    color: #ef4444;
    padding: 8px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
  }
  .logout-btn:hover {
    background: rgba(239, 68, 68, 0.1);
  }
  
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 24px;
    max-width: 1000px;
    margin: 0 auto;
  }
  
  .round-card {
    background: #0d1528;
    border: 1px solid #1a3a6e;
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    transition: all 0.3s ease;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .round-card:hover {
    border-color: #00e5a0;
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 229, 160, 0.1);
  }
  
  .round-num {
    font-size: 14px;
    color: #4a7fc1;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .round-title {
    font-size: 24px;
    color: #e0e8ff;
    font-weight: 700;
    margin-bottom: 24px;
  }
  .round-card:hover .round-title {
    color: #00e5a0;
  }
  
  .open-btn {
    background: #111d38;
    color: #a0b4d8;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: 0.2s;
  }
  .round-card:hover .open-btn {
    background: #00e5a0;
    color: #0a0f1e;
  }

  body::after {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand">MASTER ADMIN PORTAL</div>
  <a href="{{ url_for('logout') }}" class="logout-btn">Secure Logout</a>
</div>

<div class="grid">
  <!-- ROUND 1 -->
  <a href="http://localhost:5005/admin" class="round-card" target="_blank">
    <div class="round-num">Round 1</div>
    <div class="round-title">Aptitude Test</div>
    <div class="open-btn">Open Control Panel</div>
  </a>

  <!-- ROUND 3 -->
  <a href="http://localhost:5010/admin" class="round-card" target="_blank">
    <div class="round-num">Round 3</div>
    <div class="round-title">Circuit Breach</div>
    <div class="open-btn">Open Control Panel</div>
  </a>

  <!-- ROUND 4 -->
  <a href="http://localhost:5015/admin" class="round-card" target="_blank">
    <div class="round-num">Round 4</div>
    <div class="round-title">Network Hack</div>
    <div class="open-btn">Open Control Panel</div>
  </a>
</div>

</body>
</html>
