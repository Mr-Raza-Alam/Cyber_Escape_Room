<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Cyber Escape Room</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0a0f1e;
    color: #e0e8ff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .login-card {
    background: #0d1528;
    border: 1px solid #1a3a6e;
    border-radius: 16px;
    padding: 48px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  h1 {
    font-size: 24px;
    color: #00e5a0;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  p {
    font-size: 14px;
    color: #6b82a8;
    margin-bottom: 32px;
  }
  .form-group {
    margin-bottom: 24px;
    text-align: left;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    color: #4a7fc1;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    background: #111d38;
    border: 1px solid #1a3a6e;
    border-radius: 8px;
    padding: 14px;
    color: #e0e8ff;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    transition: 0.2s;
  }
  .form-group input:focus {
    border-color: #00e5a0;
  }
  .btn-primary {
    width: 100%;
    background: #00e5a0;
    border: none;
    border-radius: 8px;
    padding: 14px;
    color: #0a0f1e;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .btn-primary:hover {
    background: #00c98a;
    transform: translateY(-2px);
  }
  .error-msg {
    color: #ef4444;
    font-size: 14px;
    margin-top: 16px;
    min-height: 20px;
  }
  
  body::after {
    content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }
</style>
</head>
<body>

<div class="login-card">
  <h1>Master Control</h1>
  <p>Authenticate to access the admin systems</p>
  
  <form method="POST">
    <div class="form-group">
      <label>Admin Password</label>
      <input type="password" name="password" required autofocus>
    </div>
    <button type="submit" class="btn-primary">Unlock System</button>
  </form>
  
  <div class="error-msg">
    {% if error %}
      {{ error }}
    {% endif %}
  </div>
</div>

</body>
</html>
